services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: booktrading123
      MYSQL_DATABASE: book_trading
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backend/src/main/resources/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: "8088"
      DB_URL: "jdbc:mysql://mysql:3306/book_trading?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "booktrading123"
      UPLOAD_PATH: "/app/uploads/"
    volumes:
      - upload_data:/app/uploads
    ports:
      - "8088:8088"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  upload_data:
